<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="SkyTech Aviation offers expert aircraft maintenance and services.">
        <title>SkyTech Aviation - Expert Aircraft Maintenance & Services</title>
        <link rel="stylesheet" href="style.css">
        <script src="data/content.js"></script>
    </head>
    <body>
        <div class="grid-container">
            <header class="header-section">
                <img src="images/skytech-logo.jpg" alt="SkyTech Aviation Logo" class="logo">
                <h1>SkyTech Aviation</h1>
                <nav class="nav-bar">
                    <ul>
                        <li><a href="#services">Our Services</a></li>
                        <li><a href="#schedule">Schedule Maintenance</a></li>
                        <li><a href="#about">About Us</a></li>
                        <li><a href="#contact">Contact Info</a></li>
                    </ul>
                </nav>
            </header>

            <main>
                <!-- Services Section -->
                <section id="services">
                    <h2 class="section-heading">Our Services</h2>
                    <div class="service-list"></div>
                </section>

                <!-- Schedule Maintenance Section -->
                <section id="schedule">
                    <h2 class="section-heading">Schedule Maintenance</h2>
                    <div class="schedule-content"></div>
                </section>

                <!-- About Us Section -->
                <section id="about">
                    <h2 class="section-heading">About Us</h2>
                    <div class="about-content"></div>
                </section>
            </main>

            <!-- Contact Information -->
            <footer class="contact-section" id="contact">
                <h2 class="section-heading">Contact Information</h2>
                <p>Email: support@skytechaviation.com</p>
                <p>Phone: +1 234 567 890</p>
                <p>Address: 123 Aviation Lane, Flight City</p>
            </footer>
        </div>

        <!-- Templates -->
        <template id="service-template">
            <div class="service">
                <h3 class="service-title"></h3>
                <img class="service-image" src="" alt="">
                <p class="service-description"></p>
            </div>
        </template>

        <template id="schedule-template">
            <form action="#" method="post">
                <div class="form-fields">
                    <div class="form-group">
                        <label for="name">Full Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="service">Select Service:</label>
                        <select id="service" name="service" required>
                            <option value="engine-services">Engine Services</option>
                            <option value="inspection">Aircraft Inspection</option>
                            <option value="avionics-upgrade">Avionics Upgrade</option>
                            <option value="tire-brake">Tire Replacements & Brake Checks</option>
                            <option value="washing">Aircraft Washing</option>
                            <option value="structure">Structure Repairs</option>
                            <option value="hydraulic">Hydraulic Checks</option>
                            <option value="pack">Pack Checks</option>
                            <option value="interior">Interior Inspections & Services</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Preferred Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                </div>
                <div class="form-submit">
                    <button type="submit">Submit</button>
                </div>
            </form>
        </template>

        <template id="about-template">
            <img src="" alt="SkyTech Aviation Team" class="about-image">
            <p></p>
            <p></p>
        </template>

        <script src="data/content.js"></script>
    </body>
</html>
